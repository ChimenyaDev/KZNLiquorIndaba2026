# KZN Liquor Indaba 2026 — Deploy static site + PHP API to Azure Web App
#
# The project is a static HTML application with a PHP backend (api/) that
# handles email (SMTP) and SMS (UMSG gateway) notifications.
#
# Required Azure app settings (set in the Azure portal under Configuration):
#   SMS_USERNAME      - UMSG gateway username
#   SMS_PASSWORD      - UMSG gateway password
#   SMTP_PASSWORD     - Exchange / OWA SMTP password
#
# Required GitHub secrets:
#   AZUREAPPSERVICE_CLIENTID_7542F28DB70A480494C00F85162AB01F
#   AZUREAPPSERVICE_TENANTID_141AFBC7A31C42BFBF53B7AB4CE70857
#   AZUREAPPSERVICE_SUBSCRIPTIONID_F289698593D24FFE9F155ED1A8877718

name: Build and deploy to Azure Web App - KZNLiquorIndaba2026

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to request the OIDC JWT
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7542F28DB70A480494C00F85162AB01F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_141AFBC7A31C42BFBF53B7AB4CE70857 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F289698593D24FFE9F155ED1A8877718 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'KZNLiquorIndaba2026'
          slot-name: 'Production'
          package: .
